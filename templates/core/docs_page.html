{% extends "base.html" %}
{% block title %}{{ page.title }} - DERP Docs{% endblock %}
{% block content %}
  <style>
    .docs-layout {
      display: grid;
      grid-template-columns: 240px minmax(0, 1fr);
      gap: 22px;
      align-items: start;
    }
    .docs-sidebar {
      position: sticky;
      top: 86px;
    }
    .docs-sidebar h2 {
      margin-top: 0;
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: .04em;
      color: var(--muted);
    }
    .docs-sidebar a {
      display: block;
      padding: 7px 0;
      color: #344054;
      font-weight: 550;
    }
    .docs-sidebar a.active {
      color: var(--accent);
      font-weight: 750;
    }
    .doc-body {
      max-width: 860px;
    }
    .doc-body h1 {
      margin-bottom: 12px;
    }
    .doc-body h2 {
      margin-top: 30px;
      padding-top: 8px;
      border-top: 1px solid var(--line-soft);
      font-size: 18px;
    }
    .doc-body h3 {
      margin: 22px 0 10px;
      font-size: 15px;
    }
    .doc-body ul,
    .doc-body ol {
      margin: 0 0 16px 22px;
      padding: 0;
    }
    .doc-body li {
      margin-bottom: 6px;
    }
    .doc-body code {
      padding: 2px 5px;
      border-radius: 4px;
      background: var(--line-soft);
      font-size: 13px;
    }
    .doc-body pre {
      overflow-x: auto;
      padding: 14px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #111827;
      color: #f9fafb;
    }
    .doc-body pre code {
      padding: 0;
      background: transparent;
      color: inherit;
    }
    .doc-body table {
      min-width: 0;
      margin-bottom: 18px;
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow: hidden;
    }
    @media (max-width: 840px) {
      .docs-layout {
        grid-template-columns: 1fr;
      }
      .docs-sidebar {
        position: static;
      }
    }
  </style>

  <div class="page-header">
    <div>
      <h1>{{ page.title }}</h1>
      <p class="text-subtle">Documentation from <code>docs/{{ page.slug }}.md</code></p>
    </div>
    <div class="page-actions">
      <a class="btn secondary" href="{% url 'docs_index' %}">All docs</a>
    </div>
  </div>

  <div class="docs-layout">
    <aside class="card docs-sidebar">
      <h2>Documentation</h2>
      {% for doc_page in pages %}
        <a href="{% url 'docs_page' doc_page.slug %}" class="{% if doc_page.slug == page.slug %}active{% endif %}">
          {{ doc_page.title }}
        </a>
      {% endfor %}
    </aside>

    <article class="card doc-body">
      {{ content }}
    </article>
  </div>
{% endblock %}
