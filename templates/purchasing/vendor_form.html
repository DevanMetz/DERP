{% extends "base.html" %}
{% block title %}Vendor — DERP{% endblock %}
{% block content %}
  <h1>{% if vendor %}Edit{% else %}New{% endif %} vendor</h1>
  <div class="card">
    <form method="post">{% csrf_token %}{{ form.as_p }}
      <div class="action-row">
        <button class="btn" type="submit">Save</button>
        <a class="btn secondary" href="{% url 'vendor_list' %}">Cancel</a>
      </div>
    </form>
  </div>
{% endblock %}
