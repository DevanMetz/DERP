<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Confirm workspace - DERP</title>
  <style>
    :root { --bg:#f6f7f9; --fg:#101828; --muted:#667085; --accent:#2453b3; --accent-dark:#1d438f; --line:#d9dee7; }
    * { box-sizing:border-box; margin:0; padding:0; }
    body { background:var(--bg); color:var(--fg); font:15px/1.6 Inter,ui-sans-serif,system-ui,sans-serif; min-height:100vh; display:flex; align-items:center; justify-content:center; padding:24px; }
    .card { background:#fff; border:1px solid var(--line); border-radius:12px; padding:48px 40px; max-width:460px; width:100%; text-align:center; box-shadow:0 1px 3px rgba(16,24,40,.08); }
    .mark { width:56px; height:56px; border-radius:50%; display:inline-flex; align-items:center; justify-content:center; margin-bottom:20px; background:#eaf1ff; color:var(--accent); font-size:28px; font-weight:800; }
    h1 { font-size:22px; font-weight:800; margin-bottom:10px; }
    p { color:var(--muted); font-size:15px; }
    .workspace { margin:18px 0 0; padding:12px; border:1px solid var(--line); border-radius:8px; color:var(--fg); background:#f9fafb; word-break:break-word; }
    .btn { display:inline-block; margin-top:28px; padding:13px 32px; background:var(--accent); color:#fff; border:0; border-radius:8px; font-weight:700; font-size:15px; text-decoration:none; cursor:pointer; transition:background .15s; width:100%; }
    .btn:hover { background:var(--accent-dark); }
    @media (max-width:420px) { body { padding:16px; } .card { padding:32px 22px; } h1 { font-size:20px; } }
  </style>
</head>
<body>
  <div class="card">
    <div class="mark">✓</div>
    <h1>Confirm your DERP workspace</h1>
    <p>Activate {{ company_name }} and create the workspace below.</p>
    <div class="workspace">{{ workspace_url }}</div>
    <form method="post">
      {% csrf_token %}
      <button class="btn" type="submit">Activate workspace</button>
    </form>
  </div>
</body>
</html>
