<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Check your email — DERP</title>
  <style>
    :root { --bg:#f6f7f9; --surface:#fff; --fg:#101828; --muted:#667085; --accent:#2453b3; --line:#d9dee7; }
    * { box-sizing:border-box; margin:0; padding:0; }
    body { background:var(--bg); color:var(--fg); font:15px/1.6 Inter,ui-sans-serif,system-ui,sans-serif; min-height:100vh; display:flex; align-items:center; justify-content:center; padding:24px; }
    .card { background:#fff; border:1px solid var(--line); border-radius:12px; padding:48px 40px; max-width:420px; width:100%; text-align:center; box-shadow:0 1px 3px rgba(16,24,40,.08); }
    .icon { font-size:48px; margin-bottom:20px; }
    h1 { font-size:22px; font-weight:800; margin-bottom:10px; }
    p { color:var(--muted); font-size:15px; line-height:1.6; }
    .email { font-weight:700; color:var(--fg); }
    .subdomain { margin-top:20px; padding:12px 16px; background:var(--bg); border-radius:8px; font-size:13px; color:var(--muted); }
    .subdomain strong { color:var(--accent); }
    .back { display:inline-block; margin-top:28px; font-size:13px; color:var(--accent); }
    @media (max-width:420px) { body { padding:16px; } .card { padding:32px 22px; } .icon { font-size:40px; } h1 { font-size:20px; } }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">📬</div>
    <h1>Check your email</h1>
    <p>We sent a confirmation link to <span class="email">{{ email }}</span>. Click it to activate your workspace.</p>
    <div class="subdomain">Your workspace will be at <strong>{{ subdomain }}.{{ base }}</strong></div>
    <p style="margin-top:20px; font-size:13px;">The link expires in 24 hours. Check your spam folder if you don't see it.</p>
    <a class="back" href="/signup/">← Back to sign up</a>
  </div>
</body>
</html>
