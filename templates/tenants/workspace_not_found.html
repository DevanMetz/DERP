<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="robots" content="noindex,nofollow">
  <title>Workspace not found - DERP</title>
  <style>
    :root { --bg:#f6f7f9; --surface:#fff; --fg:#101828; --muted:#667085; --accent:#2453b3; --accent-dark:#1d438f; --line:#d9dee7; }
    * { box-sizing:border-box; margin:0; padding:0; }
    body { min-height:100vh; display:grid; place-items:center; background:var(--bg); color:var(--fg); font:15px/1.6 Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; padding:24px; }
    .card { width:min(460px,100%); background:var(--surface); border:1px solid var(--line); border-radius:12px; box-shadow:0 1px 3px rgba(16,24,40,.08); padding:40px; text-align:center; }
    .eyebrow { display:inline-flex; min-height:30px; align-items:center; justify-content:center; padding:4px 12px; margin-bottom:18px; border:1px solid var(--line); border-radius:999px; background:var(--bg); color:var(--muted); font-size:12px; font-weight:800; letter-spacing:.04em; text-transform:uppercase; }
    h1 { font-size:24px; line-height:1.2; font-weight:800; margin-bottom:10px; }
    p { color:var(--muted); margin-bottom:14px; }
    .host { margin:20px 0; padding:12px 16px; border:1px solid var(--line); border-radius:8px; background:var(--bg); color:var(--fg); font-size:14px; font-weight:700; overflow-wrap:anywhere; }
    .btn { display:inline-flex; align-items:center; justify-content:center; min-height:40px; padding:10px 16px; border:1px solid var(--accent); border-radius:8px; background:var(--accent); color:#fff; font-size:14px; font-weight:700; text-decoration:none; }
    .btn:hover { background:var(--accent-dark); border-color:var(--accent-dark); }
    @media (max-width:420px) { body { padding:16px; } .card { padding:28px 20px; } h1 { font-size:21px; } .btn { width:100%; } }
  </style>
</head>
<body>
  <main class="card" aria-labelledby="missing-title">
    <div class="eyebrow">Workspace unavailable</div>
    <h1 id="missing-title">Workspace not found</h1>
    <p>No active DERP workspace is configured for this URL.</p>
    <div class="host">{{ hostname }}</div>
    <a class="btn" href="{{ public_base_url }}/">Back to DERP</a>
  </main>
</body>
</html>
